# pip install pre-commit
# pre-commit install --hook-type pre-push
repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        # Scans only the lines added in the pushed range; see x/trufflehog_scan/scan.sh.
        language: script
        entry: x/trufflehog_scan/scan.sh
        stages: [pre-push]
        always_run: true
        pass_filenames: false
