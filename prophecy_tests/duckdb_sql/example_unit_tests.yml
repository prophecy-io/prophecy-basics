# Example dbt unit tests for DuckDB SQL
# 
# Place this file in your models directory or tests directory
# and adapt it to test your actual macros and models.
#
# Run with: dbt test --select test_type:unit

unit_tests:
  # Example 1: Test simple SELECT transformation
  - name: test_duckdb_simple_transform
    model: test_model
    description: "Test simple transformation with DuckDB"
    given:
      - input: ref('input_data')
        format: dict
        rows:
          - {id: 1, value: 10}
          - {id: 2, value: 20}
    expect:
      format: dict
      rows:
        - {id: 1, doubled_value: 20}
        - {id: 2, doubled_value: 40}

  # Example 2: Test filtering
  - name: test_duckdb_filtering
    model: test_filter_model
    description: "Test data filtering"
    given:
      - input: ref('data')
        format: dict
        rows:
          - {id: 1, status: 'active'}
          - {id: 2, status: 'inactive'}
          - {id: 3, status: 'active'}
    expect:
      format: dict
      rows:
        - {id: 1, status: 'active'}
        - {id: 3, status: 'active'}

  # Example 3: Test JOIN operations
  - name: test_duckdb_join
    model: test_join_model
    description: "Test JOIN operations"
    given:
      - input: ref('users')
        format: dict
        rows:
          - {user_id: 1, name: 'Alice'}
          - {user_id: 2, name: 'Bob'}
      - input: ref('orders')
        format: dict
        rows:
          - {order_id: 1, user_id: 1, amount: 100}
          - {order_id: 2, user_id: 2, amount: 200}
    expect:
      format: dict
      rows:
        - {user_id: 1, name: 'Alice', amount: 100}
        - {user_id: 2, name: 'Bob', amount: 200}

  # Example 4: Test window functions
  - name: test_duckdb_window_functions
    model: test_window_model
    description: "Test window functions"
    given:
      - input: ref('sales')
        format: dict
        rows:
          - {date: '2024-01-01', amount: 100}
          - {date: '2024-01-02', amount: 150}
          - {date: '2024-01-03', amount: 200}
    expect:
      format: dict
      rows:
        - {date: '2024-01-01', amount: 100, running_total: 100}
        - {date: '2024-01-02', amount: 150, running_total: 250}
        - {date: '2024-01-03', amount: 200, running_total: 450}

