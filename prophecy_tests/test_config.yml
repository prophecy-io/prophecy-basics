# Test Configuration for Prophecy Basics
# This file defines test suite configurations

test_suites:
  pyspark:
    enabled: true
    description: "PySpark/Databricks tests"
    directory: "pyspark"
    python_version: "3.11"
    requires_java: true
    java_version: "11"
    markers:
      - smoke
      - regression
    
  snowflake_sql:
    enabled: false
    description: "Snowflake SQL tests"
    directory: "snowflake_sql"
    python_version: "3.11"
    requires_java: false
    markers:
      - integration
    
  databricks_sql:
    enabled: false
    description: "Databricks SQL tests"
    directory: "databricks_sql"
    python_version: "3.11"
    requires_java: false
    markers:
      - integration
    
  duckdb_sql:
    enabled: false
    description: "DuckDB SQL tests"
    directory: "duckdb_sql"
    python_version: "3.11"
    requires_java: false
    markers:
      - smoke
      - integration

# Global pytest configuration
pytest:
  addopts:
    - "-v"
    - "--tb=short"
    - "--strict-markers"
    - "--disable-warnings"
  
  coverage:
    enabled: true
    min_coverage: 80
    formats:
      - xml
      - html
  
  parallel:
    enabled: true
    workers: 2

# CI/CD specific settings
ci:
  cache_pip: true
  artifact_retention_days: 30
  fail_fast: false
  create_summary: true

